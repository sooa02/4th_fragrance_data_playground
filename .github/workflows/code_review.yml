name: Code Review

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    types: [ opened, reopened, synchronize ]
    branches:
      - dev
      - main

jobs:
  code-review:
    runs-on: ubuntu-latest
    steps:
      - uses: anc95/ChatGPT-CodeReview@v1.0.23
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MODEL: gpt-4o
          OPENAI_API_ENDPOINT: https://api.openai.com/v1
          LANGUAGE: Korean
          PROMPT: |
            이 저장소는 Git Flow를 변형한 구조를 사용합니다.

            브랜치 역할:
              - fork 저장소의 main: 개발 브랜치 역할
              - org 저장소의 dev: release 브랜치 역할
              - org 저장소의 main: deploy 브랜치 역할

            이 PR은 다음 중 하나입니다:
              1. fork/main -> org/dev
                 - release 후보 검토 단계
              2. org/dev -> org/main
                 - 실제 배포 직전 검토 단계

            브랜치 이름보다 역할 기준으로 리뷰해주세요.

            특히 org/main 대상으로 향하는 PR은:
              - 운영 장애 가능성
              - 보안 취약점
              - 데이터 손실 위험
              - 환경 변수 누락
              - Docker/Compose 배포 문제
              - DB 마이그레이션 위험
              - 롤백 가능 여부
            를 더 엄격하게 검토해주세요.

            이 PR은 CI 테스트를 통과한 이후 리뷰되는 변경입니다.
            테스트가 잡지 못하는 설계, 보안, 유지보수성, 성능, 장애 가능성 중심으로 리뷰해주세요.

            리뷰 원칙:
              - 단순 스타일 지적은 최소화
              - 실제 장애, 버그, 보안, 데이터 손실 가능성을 우선
              - 변경된 diff에 근거한 피드백만 작성
              - 추측은 "확인 필요"로 표시
              - 문제가 없으면 억지로 지적하지 않음

            피드백 형식:
              ## 요약
              - PR의 핵심 변경과 전체 위험도

              ## 반드시 확인할 문제
              - 🔴 P0: 서비스 장애, 보안 취약점, 데이터 손실 가능성
              - 🟠 P1: 명확한 버그, 심각한 성능 저하, 운영 리스크

              ## 개선 권장
              - 🟡 P2: 유지보수성, 구조, 가독성 개선
              - 🔵 P3: 추후 기술 부채로 관리할 항목

              ## 테스트 보강
              - 🟢 P4: 추가하면 좋은 단위/통합/E2E 테스트

            각 피드백은 다음 형식으로 작성:
              - 위치:
              - 문제:
              - 영향:
              - 제안:
